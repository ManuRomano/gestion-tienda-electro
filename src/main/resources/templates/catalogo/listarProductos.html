<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="contenedor">
        <h1>Catálogo</h1>

        <div class="acciones">
            <a class="btn" th:href="@{/productos/nuevo}">Crear producto</a>
            <a class="btn btn-secundario" th:href="@{/}">Volver al inicio</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Id</th><th>Nombre</th>
                    <th class="num">Precio</th><th class="num">Stock</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="producto : ${productos}">
                    <td th:text="${producto.id}"></td>
                    <td th:text="${producto.nombre}"></td>
                    <td class="num"
                        th:text="${#numbers.formatDecimal(producto.precio, 1, 'POINT', 2, 'COMMA')} + ' €'"></td>
                    <td class="num">
                        <span th:text="${producto.stock}"></span>
                        <span class="badge badge--inactivo" th:if="${producto.stock == 0}">Sin stock</span>
                    </td>
                    <td>
                        <span class="badge badge--activo" th:if="${producto.activo}">Activo</span>
                        <span class="badge badge--inactivo" th:unless="${producto.activo}">Retirado</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(productos)}">
                    <td colspan="5" class="vacio">No hay productos en el catálogo todavía.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
