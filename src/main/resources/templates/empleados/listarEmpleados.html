<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="contenedor">
        <h1>Empleados</h1>

        <div class="acciones">
            <a class="btn" th:href="@{/empleados/nuevo}">Crear empleado</a>
            <a class="btn btn-secundario" th:href="@{/}">Volver al inicio</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Id</th><th>Nombre</th><th>Apellidos</th>
                    <th>Email</th><th>Puesto</th><th>Fecha de alta</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="empleado : ${empleados}">
                    <td th:text="${empleado.id}"></td>
                    <td th:text="${empleado.nombre}"></td>
                    <td th:text="${empleado.apellidos}"></td>
                    <td th:text="${empleado.email}"></td>
                    <td th:text="${empleado.puesto}"></td>
                    <td th:text="${empleado.fechaAlta}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(empleados)}">
                    <td colspan="6" class="vacio">No hay empleados registrados todavía.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
