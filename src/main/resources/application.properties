# Nombre lógico de la aplicación (aparece en logs y actuadores)
spring.application.name=GestionTiendaElectro

# --- Base de datos: H2 en memoria ---
# "mem:tiendadb" = la BD vive en RAM y se pierde al parar la aplicación.
# Ideal para desarrollo; en producción se sustituiría por MySQL/PostgreSQL.
spring.datasource.url=jdbc:h2:mem:tiendadb
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
# ddl-auto=update: Hibernate crea/actualiza las tablas automáticamente
# a partir de las entidades (@Entity). Evita escribir SQL de creación a mano.
spring.jpa.hibernate.ddl-auto=update
# Muestra en consola cada SQL que ejecuta Hibernate (útil para aprender/depurar)
spring.jpa.show-sql=true

# Consola web de H2 para inspeccionar la BD: http://localhost:8080/h2-console
# (en el login usar la misma URL JDBC de arriba: jdbc:h2:mem:tiendadb)
spring.h2.console.enabled=true

# Puerto HTTP del servidor embebido
server.port=8080
